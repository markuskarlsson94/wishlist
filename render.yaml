services:
    - type: web
      name: backend
      env: docker
      rootDir: backend

    - type: web
      name: frontend
      runtime: static
      env: node
      rootDir: frontend
      buildCommand: npm install && npm run build
      staticPublishPath: ./dist
      envVars:
          - key: VITE_API_URL
            fromService:
                name: backend
                type: web
                property: host
      routes:
          - type: rewrite
            source: /*
            destination: /index.html
